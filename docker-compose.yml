services:
  postgres:
    image: postgres:15
    container_name: n100_postgres
    environment:
      POSTGRES_DB: bluestock_dw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bluestock_dw"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: n100_redis
    ports:
      - "6379:6379"

  django:
    image: python:3.11-slim
    container_name: n100_django
    working_dir: /app
    volumes:
      - .:/app
    command: bash -c "pip install -r requirements.txt && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: bluestock_dw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      DJANGO_ALLOWED_HOSTS: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    image: python:3.11-slim
    container_name: n100_celery
    working_dir: /app
    volumes:
      - .:/app
    command: bash -c "pip install -r requirements.txt && celery -A config worker -B -l info"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: bluestock_dw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres

volumes:
  postgres_data:
