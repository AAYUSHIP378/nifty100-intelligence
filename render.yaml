# Render Blueprint — free public URL for Nifty 100 project
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: nifty100-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-render.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /api-info/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_DEBUG
        value: "false"
      - key: WAREHOUSE_MODE
        value: csv
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nifty100-db
          property: connectionString

databases:
  - name: nifty100-db
    plan: free
    databaseName: bluestock_dw
    user: nifty100
